<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freezer Overview</title>
</head>
<body>
    <header>
        <h1>Freezer Overview</h1>
        <button id="settings-btn">Settings</button>
    </header>
    <main>
        <section id="items">
            <h2>Items</h2>
            <ul id="item-list">
                <!-- Dynamic list of items will be generated here -->
            </ul>
            <button id="add-item-btn">Add Item</button>
        </section>
    </main>

    <!-- Edit Modal -->
    <div id="edit-modal" style="display:none;">
        <h2>Edit Item</h2>
        <form id="edit-item-form">
            <input type="text" id="item-name" placeholder="Item Name" required />
            <input type="number" id="item-quantity" placeholder="Quantity" required />
            <button type="submit">Save</button>
            <button type="button" id="close-edit-modal">Close</button>
        </form>
    </div>

    <!-- Photo Modal -->
    <div id="photo-modal" style="display:none;">
        <h2>Add Photo</h2>
        <input type="file" id="photo-input" />
        <button id="upload-photo-btn">Upload</button>
        <button type="button" id="close-photo-modal">Close</button>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" style="display:none;">
        <h2>Settings</h2>
        <form id="settings-form">
            <input type="text" id="freezer-name" placeholder="Freezer Name" required />
            <button type="submit">Save</button>
            <button type="button" id="close-settings-modal">Close</button>
        </form>
    </div>

    <script>
        // JavaScript for modals and functionalities
        document.getElementById('add-item-btn').addEventListener('click', function() {
            // Open edit modal for adding new item
            document.getElementById('edit-modal').style.display = 'block';
        });

        document.getElementById('close-edit-modal').addEventListener('click', function() {
            document.getElementById('edit-modal').style.display = 'none';
        });

        // Handle edit item submission
        document.getElementById('edit-item-form').addEventListener('submit', function(event) {
            event.preventDefault();
            // Logic for updating item...
            document.getElementById('edit-modal').style.display = 'none';
        });

        // Similar functions for photo modal and settings modal
    </script>
</body>
</html>
